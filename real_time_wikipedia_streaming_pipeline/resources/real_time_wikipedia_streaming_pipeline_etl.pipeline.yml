# The main pipeline for real_time_wikipedia_streaming_pipeline

resources:
  pipelines:
    real_time_wikipedia_streaming_pipeline_etl:
      name: real_time_wikipedia_streaming_pipeline_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      root_path: "../src/real_time_wikipedia_streaming_pipeline_etl"

      libraries:
        - glob:
            include: ../src/real_time_wikipedia_streaming_pipeline_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
